name: Admin Post Bot

on:
  workflow_dispatch:
  # Optional: Run on schedule if you want to keep it alive
  # schedule:
  #   - cron: '*/30 * * * *'

jobs:
  run-admin-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 python-telegram-bot==21.6 pillow requests

      - name: Ensure folders & files
        run: |
          mkdir -p data
          mkdir -p global_index
          mkdir -p images
          touch last_crunchyroll_fp.txt || true
          touch last_youtube_id.txt || true

      - name: Run admin post bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_post_bot.py

      - name: Commit & push if changed
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add -A

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "admin: add new article via bot"

          # Rebase in case remote got new commits
          git pull --rebase --autostash origin "$GITHUB_REF_NAME" || true
          git push origin HEAD:"$GITHUB_REF_NAME"
